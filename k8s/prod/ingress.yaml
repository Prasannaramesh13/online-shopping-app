apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hmis-mf-ingress
spec:
  ingressClassName: nginx
  rules:
  - host: test.justtrytech.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: hmis-mf-service
            port:
              number: 80
